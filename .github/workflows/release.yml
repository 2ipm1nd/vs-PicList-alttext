name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Rename and get VSIX filename
        id: vsix
        run: |
          ORIGINAL=$(ls *.vsix)
          # 將 tag (e.g. v1.3.2-r1) 加入檔名：vs-piclist-alttext-1.3.2-r1.vsix
          TAG="${GITHUB_REF_NAME#v}"
          NEW_NAME="vs-piclist-alttext-${TAG}.vsix"
          mv "$ORIGINAL" "$NEW_NAME"
          echo "file=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # 擷取對應版本的 changelog 區塊
          NOTES=$(awk "/^## \[?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          # 寫入多行輸出
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: ${{ steps.vsix.outputs.file }}
          draft: false
          prerelease: false
